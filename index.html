<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ AI — Personal Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-info">
                <h2>XYZ AI</h2>
                <p>Secure Local Proxy Connection</p>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>ONLINE</span>
            </div>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                <div class="bubble">System initialized. Main aapka custom AI assistant hoon, batao bhai aaj kya banayein?</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
                <button id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
